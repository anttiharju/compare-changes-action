name: "Compare changes"
description: "Conditionally run jobs and steps based on find-changes-action output."
branding:
  icon: minimize-2
  color: orange
inputs:
  github-workflows-wildcard:
    description: "Name of the GitHub Workflow wildcard .github/workflows/wildcard-*"
    required: true
  changes:
    description: "JSON array of changed files (from anttiharju/find-changes-action)"
    required: true
  version:
    description: "compare-changes version to use, semver format without v prefix"
    required: false
    default: "0.6.13"
  debug:
    description: "Enable compare-changes --debug output (true/false)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Check if compare-changes is in PATH
      id: compare-changes
      shell: sh
      run: |
        if command -v compare-changes >/dev/null 2>&1; then
          echo 'compare-changes is already installed'
          echo "installed=true" >> "$GITHUB_OUTPUT"
        fi
    - if: steps.compare-changes.outputs.installed != 'true'
      name: Convert target
      id: convert
      shell: sh
      env:
        os: ${{ runner.os }} # Possible values are Linux, Windows, or macOS.
        arch: ${{ runner.arch }} # Possible values are X86, X64, ARM, or ARM64.
      run: |
        target="$os-$arch"
        case "$target" in
          Linux-ARM64) echo "target=aarch64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
          Linux-X64) echo "target=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
          *) echo "Unsupported os-arch target: $target" >&2; exit 1 ;;
        esac
    - if: steps.compare-changes.outputs.installed != 'true'
      name: Cache
      id: cache
      uses: actions/cache@v5
      with:
        path: /usr/local/bin/compare-changes
        key: compare-changes_v${{ inputs.version }}_${{ steps.convert.outputs.target }}
    - if: steps.compare-changes.outputs.installed != 'true' && steps.cache.outputs.cache-hit != 'true'
      name: Install
      working-directory: ${{ runner.temp }}
      shell: sh
      env:
        GH_TOKEN: ${{ github.token }}
        version: ${{ inputs.version }}
        target: ${{ steps.convert.outputs.target }}
      run: |
        printf 'gh release download "v%s" --repo anttiharju/compare-changes --pattern "compare-changes-%s.tar.gz"\n' "$version" "$target"
        gh release download "v$version" --repo anttiharju/compare-changes --pattern "compare-changes-$target.tar.gz"
        tar -xzf "compare-changes-$target.tar.gz" compare-changes
        mv compare-changes /usr/local/bin
    - name: Run
      id: wildcard
      shell: sh
      env:
        wildcard: ${{ inputs.github-workflows-wildcard }}
        changes: ${{ inputs.changes }}
        debug: ${{ inputs.debug }}
      run: |
        printf 'compare-changes --wildcard "%s" --changes "%s"\n' "$wildcard" "$changes"
        debug_flag=""
        if [ "$debug" = "true" ]; then
          debug_flag="--debug"
        fi
        compare-changes --wildcard "$wildcard" --changes "$changes" $debug_flag
outputs:
  changed:
    description: "Boolean indicating if any changed files match paths in the wildcard file"
    value: ${{ steps.wildcard.outputs.changed }}
